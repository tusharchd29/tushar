<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ode to Joy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 48px 40px;
      text-align: center;
      width: 320px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .note-icon {
      font-size: 56px;
      margin-bottom: 16px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    h1 { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    p  { color: rgba(255,255,255,0.45); font-size: 13px; margin-bottom: 32px; }
    .btn-play {
      width: 72px; height: 72px;
      border-radius: 50%; border: none;
      background: linear-gradient(135deg, #7b5af5, #e855a0);
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px rgba(123,90,245,0.5);
      transition: transform 0.15s, box-shadow 0.15s;
      margin-bottom: 28px;
    }
    .btn-play:hover { transform: scale(1.08); box-shadow: 0 0 44px rgba(123,90,245,0.7); }
    .btn-play:active { transform: scale(0.96); }
    .bar-bg {
      width: 100%; height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      cursor: pointer; position: relative;
    }
    .bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #7b5af5, #e855a0);
      border-radius: 99px;
      pointer-events: none;
      transition: width 0.1s linear;
    }
    .times {
      display: flex; justify-content: space-between;
      font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 7px;
    }
    .status { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 16px; min-height: 18px; }
    .status.playing { color: #a78bfa; }
  </style>
</head>
<body>
<div class="card">
  <span class="note-icon">🎵</span>
  <h1>Ode to Joy</h1>
  <p>Ludwig van Beethoven · Public Domain</p>

  <button class="btn-play" id="btn" onclick="togglePlay()">
    <svg id="ico-play" width="28" height="28" viewBox="0 0 24 24" fill="white"><polygon points="6,3 20,12 6,21"/></svg>
    <svg id="ico-pause" width="28" height="28" viewBox="0 0 24 24" fill="white" style="display:none"><rect x="5" y="3" width="5" height="18"/><rect x="14" y="3" width="5" height="18"/></svg>
  </button>

  <div class="bar-bg" id="barBg" onclick="seek(event)">
    <div class="bar-fill" id="barFill"></div>
  </div>
  <div class="times">
    <span id="cur">0:00</span>
    <span id="dur">0:00</span>
  </div>

  <div class="status" id="status">Click play to start</div>
</div>

<script>
// ── Web Audio API music engine ──────────────────────────────
let ctx, masterGain, isPlaying = false;
let startTime = 0, pausedAt = 0;
let scheduledNodes = [];
let rafId = null;

const BPM = 108;
const beat = 60 / BPM;
const totalDuration = beat * 64; // approx 28 seconds

// Ode to Joy full melody (note, beats)
const melody = [
  ['E4',1],['E4',1],['F4',1],['G4',1],
  ['G4',1],['F4',1],['E4',1],['D4',1],
  ['C4',1],['C4',1],['D4',1],['E4',1],
  ['E4',1.5],['D4',0.5],['D4',2],

  ['E4',1],['E4',1],['F4',1],['G4',1],
  ['G4',1],['F4',1],['E4',1],['D4',1],
  ['C4',1],['C4',1],['D4',1],['E4',1],
  ['D4',1.5],['C4',0.5],['C4',2],

  ['D4',1],['D4',1],['E4',1],['C4',1],
  ['D4',1],['E4',0.5],['F4',0.5],['E4',1],['C4',1],
  ['D4',1],['E4',0.5],['F4',0.5],['E4',1],['D4',1],
  ['C4',1],['D4',1],['G4',2],

  ['E4',1],['E4',1],['F4',1],['G4',1],
  ['G4',1],['F4',1],['E4',1],['D4',1],
  ['C4',1],['C4',1],['D4',1],['E4',1],
  ['D4',1.5],['C4',0.5],['C4',2],
];

const noteFreq = {
  C4:261.63, D4:293.66, E4:329.63, F4:349.23,
  G4:392.00, A4:440.00, B4:493.88, C5:523.25
};

function fmt(s) {
  s = Math.max(0, s);
  return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
}

function playNote(freq, startAt, duration) {
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();

  // Add harmonics via two oscillators
  const osc2 = ctx.createOscillator();
  const g2   = ctx.createGain();

  osc.type  = 'triangle';
  osc.frequency.value = freq;
  osc2.type = 'sine';
  osc2.frequency.value = freq * 2;

  g2.gain.value = 0.18;

  const attack  = 0.015;
  const release = Math.min(duration * 0.35, 0.18);
  const sustain = duration - attack - release;

  gain.gain.setValueAtTime(0, startAt);
  gain.gain.linearRampToValueAtTime(0.55, startAt + attack);
  gain.gain.setValueAtTime(0.55, startAt + attack + sustain);
  gain.gain.linearRampToValueAtTime(0, startAt + duration);

  osc.connect(gain);
  osc2.connect(g2);
  g2.connect(gain);
  gain.connect(masterGain);

  osc.start(startAt);  osc.stop(startAt + duration);
  osc2.start(startAt); osc2.stop(startAt + duration);

  scheduledNodes.push(osc, osc2);
}

function scheduleAll(offset) {
  let t = ctx.currentTime + 0.05;
  startTime = t - offset;

  for (const [note, beats] of melody) {
    const dur = beats * beat;
    const freq = noteFreq[note];
    if (freq) playNote(freq, t, dur * 0.92);
    t += dur;
  }
}

function stopAll() {
  scheduledNodes.forEach(n => { try { n.stop(); } catch(e){} });
  scheduledNodes = [];
}

function updateBar() {
  if (!isPlaying) return;
  const elapsed = ctx.currentTime - startTime;
  const pct = Math.min(elapsed / totalDuration * 100, 100);
  document.getElementById('barFill').style.width = pct + '%';
  document.getElementById('cur').textContent = fmt(elapsed);

  if (elapsed >= totalDuration) {
    isPlaying = false;
    pausedAt = 0;
    document.getElementById('ico-play').style.display = '';
    document.getElementById('ico-pause').style.display = 'none';
    document.getElementById('status').textContent = 'Finished';
    document.getElementById('status').className = 'status';
    document.getElementById('barFill').style.width = '0%';
    document.getElementById('cur').textContent = '0:00';
    return;
  }
  rafId = requestAnimationFrame(updateBar);
}

function togglePlay() {
  if (!ctx) {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.gain.value = 0.9;
    masterGain.connect(ctx.destination);
    document.getElementById('dur').textContent = fmt(totalDuration);
  }

  if (ctx.state === 'suspended') ctx.resume();

  if (!isPlaying) {
    // PLAY
    scheduleAll(pausedAt);
    isPlaying = true;
    document.getElementById('ico-play').style.display = 'none';
    document.getElementById('ico-pause').style.display = '';
    document.getElementById('status').textContent = '▶ Now playing…';
    document.getElementById('status').className = 'status playing';
    rafId = requestAnimationFrame(updateBar);
  } else {
    // PAUSE
    pausedAt = ctx.currentTime - startTime;
    stopAll();
    cancelAnimationFrame(rafId);
    isPlaying = false;
    document.getElementById('ico-play').style.display = '';
    document.getElementById('ico-pause').style.display = 'none';
    document.getElementById('status').textContent = 'Paused';
    document.getElementById('status').className = 'status';
  }
}

function seek(e) {
  if (!ctx) return;
  const r = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - r.left) / r.width;
  const newTime = pct * totalDuration;
  if (isPlaying) {
    stopAll();
    cancelAnimationFrame(rafId);
    pausedAt = newTime;
    scheduleAll(pausedAt);
    rafId = requestAnimationFrame(updateBar);
  } else {
    pausedAt = newTime;
    document.getElementById('barFill').style.width = (pct * 100) + '%';
    document.getElementById('cur').textContent = fmt(newTime);
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Faded · Tushar</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 48px 40px 36px;
      text-align: center;
      width: 320px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .note-icon {
      font-size: 56px; margin-bottom: 16px; display: block;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    h1 { color:#fff; font-size:22px; font-weight:700; margin-bottom:6px; }
    p  { color:rgba(255,255,255,0.45); font-size:13px; margin-bottom:32px; }

    .btn-play {
      width:72px; height:72px; border-radius:50%; border:none;
      background: linear-gradient(135deg, #7b5af5, #e855a0);
      cursor:pointer; display:inline-flex; align-items:center; justify-content:center;
      box-shadow: 0 0 30px rgba(123,90,245,0.5);
      transition: transform 0.15s, box-shadow 0.15s;
      margin-bottom: 28px;
    }
    .btn-play:hover { transform:scale(1.08); box-shadow:0 0 44px rgba(123,90,245,0.7); }
    .btn-play:active { transform:scale(0.96); }

    /* Seek bar */
    .seek-wrap { margin-bottom: 10px; user-select: none; }
    .seek-track {
      width:100%; height:6px;
      background: rgba(255,255,255,0.12);
      border-radius:99px; position:relative; cursor:pointer;
    }
    .seek-fill {
      height:100%; width:0%;
      background: linear-gradient(90deg, #7b5af5, #e855a0);
      border-radius:99px; pointer-events:none;
      transition: width 0.1s linear;
    }
    .seek-thumb {
      width:16px; height:16px; border-radius:50%;
      background:#fff;
      box-shadow: 0 0 6px rgba(123,90,245,0.8);
      position:absolute; top:50%; transform:translate(-50%,-50%);
      left:0%; pointer-events:none;
      transition: left 0.1s linear;
    }
    .times {
      display:flex; justify-content:space-between;
      font-size:11px; color:rgba(255,255,255,0.3); margin-top:8px;
    }
    .status { font-size:12px; color:rgba(255,255,255,0.4); margin-top:16px; min-height:18px; }
    .status.playing { color:#a78bfa; }

    /* Volume */
    .vol-wrap {
      display:flex; align-items:center; gap:10px; margin-top:18px;
    }
    .vol-icon { color:rgba(255,255,255,0.3); flex-shrink:0; font-size:14px; }
    input[type=range] {
      flex:1; -webkit-appearance:none; height:3px;
      background:rgba(255,255,255,0.12); border-radius:99px; outline:none; cursor:pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance:none; width:14px; height:14px;
      border-radius:50%; background:#7b5af5; cursor:pointer;
    }
  </style>
</head>
<body>
<div class="card">
  <span class="note-icon">🎵</span>
  <h1>Faded</h1>
  <p>Tushar</p>

  <button class="btn-play" onclick="togglePlay()">
    <svg id="ico-play" width="28" height="28" viewBox="0 0 24 24" fill="white"><polygon points="6,3 20,12 6,21"/></svg>
    <svg id="ico-pause" width="28" height="28" viewBox="0 0 24 24" fill="white" style="display:none"><rect x="5" y="3" width="5" height="18"/><rect x="14" y="3" width="5" height="18"/></svg>
  </button>

  <div class="seek-wrap">
    <div class="seek-track" id="seekTrack">
      <div class="seek-fill" id="seekFill"></div>
      <div class="seek-thumb" id="seekThumb"></div>
    </div>
    <div class="times">
      <span id="cur">0:00</span>
      <span id="dur">--:--</span>
    </div>
  </div>

  <div class="status" id="status">Click play to start</div>

  <div class="vol-wrap">
    <span class="vol-icon">🔈</span>
    <input type="range" id="vol" min="0" max="1" step="0.02" value="0.9" oninput="audio.volume=this.value">
    <span class="vol-icon">🔊</span>
  </div>
</div>

<audio id="audio"
  src="https://raw.githubusercontent.com/tusharchd29/tushar/main/faded.mp3"
  preload="auto">
</audio>

<script>
const audio    = document.getElementById('audio');
const fill     = document.getElementById('seekFill');
const thumb    = document.getElementById('seekThumb');
const curEl    = document.getElementById('cur');
const durEl    = document.getElementById('dur');
const status   = document.getElementById('status');
const iPlay    = document.getElementById('ico-play');
const iPause   = document.getElementById('ico-pause');
const track    = document.getElementById('seekTrack');

audio.volume = 0.9;

function fmt(s) {
  s = Math.max(0, s || 0);
  return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
}

function updateBar() {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  fill.style.width  = pct + '%';
  thumb.style.left  = pct + '%';
  curEl.textContent = fmt(audio.currentTime);
}

audio.addEventListener('loadedmetadata', () => durEl.textContent = fmt(audio.duration));
audio.addEventListener('timeupdate', updateBar);
audio.addEventListener('ended', () => {
  iPlay.style.display = ''; iPause.style.display = 'none';
  status.textContent = 'Finished'; status.className = 'status';
  fill.style.width = '0%'; thumb.style.left = '0%';
  curEl.textContent = '0:00';
});

function togglePlay() {
  if (audio.paused) {
    audio.play();
    iPlay.style.display = 'none'; iPause.style.display = '';
    status.textContent = '▶ Now playing…'; status.className = 'status playing';
  } else {
    audio.pause();
    iPlay.style.display = ''; iPause.style.display = 'none';
    status.textContent = 'Paused'; status.className = 'status';
  }
}

// Seek by click or drag
let dragging = false;

function seekTo(e) {
  const r = track.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
  const pct = Math.max(0, Math.min(1, x / r.width));
  if (audio.duration) audio.currentTime = pct * audio.duration;
}

track.addEventListener('mousedown',  e => { dragging = true; seekTo(e); });
track.addEventListener('touchstart', e => { dragging = true; seekTo(e); }, {passive:true});
document.addEventListener('mousemove',  e => { if (dragging) seekTo(e); });
document.addEventListener('touchmove',  e => { if (dragging) seekTo(e); }, {passive:true});
document.addEventListener('mouseup',  () => dragging = false);
document.addEventListener('touchend', () => dragging = false);
</script>
</body>
</html>

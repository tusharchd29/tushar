<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ode to Joy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 48px 40px;
      text-align: center;
      width: 320px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .note-icon {
      font-size: 56px;
      margin-bottom: 16px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    h1 { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    p  { color: rgba(255,255,255,0.45); font-size: 13px; margin-bottom: 32px; }
    .btn-play {
      width: 72px; height: 72px;
      border-radius: 50%; border: none;
      background: linear-gradient(135deg, #7b5af5, #e855a0);
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px rgba(123,90,245,0.5);
      transition: transform 0.15s, box-shadow 0.15s;
      margin-bottom: 28px;
    }
    .btn-play:hover { transform: scale(1.08); box-shadow: 0 0 44px rgba(123,90,245,0.7); }
    .btn-play:active { transform: scale(0.96); }
    .bar-bg {
      width: 100%; height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      cursor: pointer; position: relative;
    }
    .bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #7b5af5, #e855a0);
      border-radius: 99px;
      pointer-events: none;
      transition: width 0.1s linear;
    }
    .times {
      display: flex; justify-content: space-between;
      font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 7px;
    }
    .status { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 16px; min-height: 18px; }
    .status.playing { color: #a78bfa; }
  </style>
</head>
<body>
<div class="card">
  <span class="note-icon">🎵</span>
  <h1>Faded</h1>
  <p>Tushar</p>

  <button class="btn-play" id="btn" onclick="togglePlay()">
    <svg id="ico-play" width="28" height="28" viewBox="0 0 24 24" fill="white"><polygon points="6,3 20,12 6,21"/></svg>
    <svg id="ico-pause" width="28" height="28" viewBox="0 0 24 24" fill="white" style="display:none"><rect x="5" y="3" width="5" height="18"/><rect x="14" y="3" width="5" height="18"/></svg>
  </button>

  <div class="bar-bg" id="barBg" onclick="seek(event)">
    <div class="bar-fill" id="barFill"></div>
  </div>
  <div class="times">
    <span id="cur">0:00</span>
    <span id="dur">0:00</span>
  </div>

  <div class="status" id="status">Click play to start</div>
</div>

<audio id="audio" src="https://raw.githubusercontent.com/tusharchd29/ode-to-joy-player/main/faded.mp3" preload="auto"></audio>

<script>
  const audio  = document.getElementById('audio');
  const fill   = document.getElementById('barFill');
  const curEl  = document.getElementById('cur');
  const durEl  = document.getElementById('dur');
  const status = document.getElementById('status');
  const iPlay  = document.getElementById('ico-play');
  const iPause = document.getElementById('ico-pause');

  function fmt(s) {
    return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
  }

  audio.addEventListener('loadedmetadata', () => durEl.textContent = fmt(audio.duration));

  audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
      fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      curEl.textContent = fmt(audio.currentTime);
    }
  });

  audio.addEventListener('ended', () => {
    iPlay.style.display = ''; iPause.style.display = 'none';
    status.textContent = 'Finished'; status.className = 'status';
    fill.style.width = '0%'; curEl.textContent = '0:00';
  });

  function togglePlay() {
    if (audio.paused) {
      audio.play();
      iPlay.style.display = 'none'; iPause.style.display = '';
      status.textContent = '▶ Now playing…'; status.className = 'status playing';
    } else {
      audio.pause();
      iPlay.style.display = ''; iPause.style.display = 'none';
      status.textContent = 'Paused'; status.className = 'status';
    }
  }

  function seek(e) {
    if (!audio.duration) return;
    const r = e.currentTarget.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
  }
</script>
</body>
</html>
